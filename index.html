<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de Países</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Buscador de Países</h1>

    <div class="search-card">
      <label for="country-input">Escribe el nombre de un país:</label>
      <div class="input-group">
        <input id="country-input" type="text" placeholder="Ej: México" />
        <button id="search-button">Consultar</button>
      </div>
    </div>

    <section id="result" class="result-card">
      <p class="info">Ingresa un país y presiona Consultar para ver los datos.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
